spring:
  application:
    name: backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/challenge}
    username: ${DB_USERNAME:challenge}
    password: ${DB_PASSWORD:challenge}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: challenge-backend
      auto-offset-reset: earliest

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-key-change-me-in-production-32bytes-min}
    access-token-expiry-seconds: ${JWT_ACCESS_EXPIRY_SECONDS:1800}
    refresh-token-expiry-seconds: ${JWT_REFRESH_EXPIRY_SECONDS:1209600}
